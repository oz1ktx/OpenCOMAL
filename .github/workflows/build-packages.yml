name: Build DEB and RPM Packages

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags (v1.0.0, etc.)
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-deb:
    name: Build DEB Package
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++ libncurses-dev libreadline-dev qt6-base-dev libqscintilla2-qt6-dev qt6-multimedia-dev libfluidsynth-dev

    - name: Build DEB package
      run: |
        mkdir -p build
        cd build
        cmake -S .. -DCPACK_GENERATOR="DEB" -DCMAKE_BUILD_TYPE=Release
        cmake --build . --config Release -j$(nproc)
        cpack -G DEB

    - name: Upload DEB artifact
      uses: actions/upload-artifact@v7
      with:
        name: deb-packages
        path: build/*.deb
        retention-days: 30

  build-rpm:
    name: Build RPM Package
    runs-on: ubuntu-latest
    container: fedora:latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        dnf install -y cmake gcc-c++ ncurses-devel readline-devel qt6-qtbase-devel qscintilla-qt6-devel qt6-qtmultimedia-devel fluidsynth-devel rpm-build

    - name: Build RPM package
      run: |
        mkdir -p build
        cd build
        cmake -S .. -DCPACK_GENERATOR="RPM" -DCMAKE_BUILD_TYPE=Release
        cmake --build . --config Release -j$(nproc)
        cpack -G RPM

    - name: Upload RPM artifact
      uses: actions/upload-artifact@v7
      with:
        name: rpm-packages
        path: build/*.rpm
        retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: [build-deb, build-rpm]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    permissions:
      contents: write
    
    steps:
    - name: Download DEB artifacts
      uses: actions/download-artifact@v4
      with:
        name: deb-packages
        path: artifacts/deb

    - name: Download RPM artifacts
      uses: actions/download-artifact@v4
      with:
        name: rpm-packages
        path: artifacts/rpm

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/deb/*.deb
          artifacts/rpm/*.rpm
        draft: false
        prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
